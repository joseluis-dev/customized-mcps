schema: spec-driven

context: |
  Workspace: pnpm monorepo hosting multiple TypeScript MCP packages (Node >=20, TS 5.7,
  NodeNext modules, strict mode, vitest 2.1).
  Architecture: workspace root is non-deployable. Each app lives in apps/<app-name>/,
  each shared library in packages/<pkg-name>/, each owning manifest, source, tests, and build.
  Current packages:
    - apps/mcp-readonly-sql — Read-only SQL MCP server (PostgreSQL, MySQL, SQL Server, SQLite)
    - apps/mcp-oauth-admin — OAuth2 authorization server + SQLite identity store + admin UI
    - packages/mcp-http-base — Shared Streamable HTTP transport, auth, health, logging, shutdown
  Future Python MCPs will live in apps/<py-app>/ and are invoked via `uv --project apps/<py-app>`.
  Commands target a specific package via `pnpm --filter <name>`. Root fallback
  (`pnpm test`, `pnpm typecheck`, `pnpm build`) runs recursively across the workspace.

rules:
  proposal:
    - Every change MUST keep the read-only safety guarantee observable (sqlGuard or engine-level).
    - Include rollback plan when adding a new tool, dialect, storage backend, or app.
  specs:
    - Use Given/When/Then for scenarios.
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY).
    - New MCP tools MUST be tagged with profile-scope, allowlist behavior, and error contract.
  design:
    - Document any new SQL parsing or AST traversal with rationale vs. node-sql-parser AST shape.
    - Document cross-database routing (USE / SET search_path / connection DB) for each dialect.
    - Security-sensitive decisions (allowlist, qualification, path traversal) MUST list threats + mitigations.
    - Workspace-affecting changes MUST list which app(s) own the behavior and which commands target them.
  tasks:
    - Group by phase, use hierarchical numbering (1, 1.1, 1.2, 2, ...).
    - Keep tasks completable in one session; pair every code task with a vitest task when logic is testable.
  apply:
    settings:
      tdd: true
      test_command:
        mcp-readonly-sql: pnpm --filter mcp-readonly-sql test
        mcp-oauth-admin: pnpm --filter mcp-oauth-admin test
        mcp-http-base: pnpm --filter @customized-mcps/mcp-http-base test
        root: pnpm test
      build_command:
        mcp-readonly-sql: pnpm --filter mcp-readonly-sql build
        mcp-oauth-admin: pnpm --filter mcp-oauth-admin build
        mcp-http-base: pnpm --filter @customized-mcps/mcp-http-base build
        root: pnpm build
    rules:
      - "Follow existing app module layout: apps/<app-name>/src/{config,db,security,tools}."
      - "New SQL guard rules MUST ship with vitest cases in apps/<app-name>/test/sqlGuard.test.ts first."
      - "Never edit the workspace root's src/ or test/ directories — apps own their own source tree."
  verify:
    settings:
      test_command:
        mcp-readonly-sql: pnpm --filter mcp-readonly-sql test
        mcp-oauth-admin: pnpm --filter mcp-oauth-admin test
        mcp-http-base: pnpm --filter @customized-mcps/mcp-http-base test
        root: pnpm test
      build_command:
        mcp-readonly-sql: pnpm --filter mcp-readonly-sql build
        mcp-oauth-admin: pnpm --filter mcp-oauth-admin build
        mcp-http-base: pnpm --filter @customized-mcps/mcp-http-base build
        root: pnpm build
      typecheck_command:
        mcp-readonly-sql: pnpm --filter mcp-readonly-sql typecheck
        mcp-oauth-admin: pnpm --filter mcp-oauth-admin typecheck
        mcp-http-base: pnpm --filter @customized-mcps/mcp-http-base typecheck
        root: pnpm typecheck
      coverage_threshold: 0
    rules:
      - Confirm TypeScript strictness still passes (noUncheckedIndexedAccess + noImplicitOverride).
      - Confirm the workspace root has no `bin` field, no `dist/`, and no app-owned code at the root.
  archive:
    - Warn before merging deltas that change the public MCP tool surface.
    - When an app moves between paths or a new app is added, regenerate the root README app index.

testing:
  strict_tdd: true
  runner: vitest
  runner_command:
    mcp-readonly-sql: pnpm --filter mcp-readonly-sql test
    mcp-oauth-admin: pnpm --filter mcp-oauth-admin test
    mcp-http-base: pnpm --filter @customized-mcps/mcp-http-base test
    root: pnpm test
  watch_command:
    mcp-readonly-sql: pnpm --filter mcp-readonly-sql test:watch
    mcp-oauth-admin: pnpm --filter mcp-oauth-admin test:watch
    mcp-http-base: pnpm --filter @customized-mcps/mcp-http-base test:watch
  layers:
    unit: true
    integration: false
    e2e: false
  coverage_available: false
  coverage_command: ""
  typecheck_command:
    mcp-readonly-sql: pnpm --filter mcp-readonly-sql typecheck
    mcp-oauth-admin: pnpm --filter mcp-oauth-admin typecheck
    mcp-http-base: pnpm --filter @customized-mcps/mcp-http-base typecheck
    root: pnpm typecheck
  lint_command: ""
  format_command: ""
  notes:
    - "All packages use vitest 2.1 with identical config: node env, test/**/*.test.ts, forbidOnly, no globals."
    - "@vitest/coverage is not in devDependencies — coverage tooling is unavailable until added."
    - "No ESLint, Prettier, or editorconfig files are present; style is enforced by tsc + manual review."
    - "Tests run from the package directory because pnpm `--filter` sets cwd to the package root; vitest config include path is `test/**/*.test.ts` (relative to package)."
