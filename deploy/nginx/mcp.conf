# =============================================================================
# mcp-readonly-sql — example reverse proxy configuration
# =============================================================================
# This file is a STANDALONE nginx config — it can be validated directly with:
#   nginx -t -c deploy/nginx/mcp.conf
#
# For operators who already have a system nginx, copy the `server { ... }`
# block (and only that block) into their `http { ... }` context and skip
# the `events`/`http` blocks at the top. The example uses the standard
# /etc/ssl/certs/ paths; replace with your operator-provided certs.
#
# Spec: mcp-deployment-templates → "Reverse Proxy Example"
#  - Terminates TLS at the proxy (listen 443 ssl).
#  - Proxies plain HTTP to 127.0.0.1:3001 (the app's MCP_HTTP_PORT).
#  - Preserves the Authorization header (proxy_set_header ... $http_authorization).
#  - Enforces a 1 MiB body cap (client_max_body_size 1m).
#  - Validates with `nginx -t` → exit 0.
# =============================================================================

# --- Required: top-level context for `nginx -t` ---
# When integrating into an existing nginx, delete the next 5 lines and paste
# the `http { ... }` block (and its child server blocks) into the operator's
# existing http context.
user                www-data;
worker_processes    auto;
error_log           /var/log/nginx/mcp-error.log warn;
pid                 /run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    log_format mcp_combined '$remote_addr - [$time_local] '
                            '"$request" $status $body_bytes_sent '
                            'rt=$request_time '
                            'req_id=$http_x_request_id';

    access_log          /var/log/nginx/mcp-access.log mcp_combined;

    # --- Basic file serving / MIME ---
    include             /etc/nginx/mime.types;
    default_type        application/octet-stream;
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;

    # --- Gzip ---
    # The MCP wire is mostly small JSON; gzip is mostly a no-op but it's
    # cheap and helps when streaming large read-only result sets.
    gzip                on;
    gzip_types          application/json text/plain;
    gzip_min_length     256;

    # --- Proxy tunables ---
    # proxy_*_timeout are intentionally > the app's
    # MCP_HTTP_SHUTDOWN_TIMEOUT_MS (default 10000) so a slow client
    # upload can still complete. send_timeout / keepalive are aligned
    # with typical MCP request bounds.
    proxy_connect_timeout   5s;
    proxy_send_timeout      30s;
    proxy_read_timeout      30s;
    send_timeout            30s;
    proxy_http_version      1.1;
    proxy_buffering         off;
    proxy_cache             off;

    # --- Real client IP (set this to your network) ---
    # The example trusts the loopback + RFC1918 private ranges. Operators
    # on a public-facing host should narrow this to their edge proxy IP
    # only. The app uses the X-Forwarded-For header for logging only.
    real_ip_header      X-Forwarded-For;
    set_real_ip_from    127.0.0.1;
    set_real_ip_from    10.0.0.0/8;        # adjust to your network
    set_real_ip_from    172.16.0.0/12;     # adjust to your network
    set_real_ip_from    192.168.0.0/16;    # adjust to your network

    # --- Body-size cap (REQUIRED — the app returns 411 for chunked
    # bodies by default, so the proxy is the only place a chunked
    # upload is bounded). DO NOT raise this above the app's
    # MCP_HTTP_MAX_BODY_BYTES (default 1 MiB) without also raising
    # the app cap and accepting the larger DoS surface. ---
    client_max_body_size        1m;
    client_body_buffer_size     16k;
    client_header_buffer_size   1k;
    large_client_header_buffers 4 8k;

    # --- HTTP -> HTTPS redirect ---
    server {
        listen          80;
        listen          [::]:80;
        server_name     _;
        # 301 (not 302) is a permanent move; safe for static hostnames.
        return 301 https://$host$request_uri;
    }

    # --- HTTPS reverse proxy in front of the MCP app ---
    server {
        listen          443 ssl;
        listen          [::]:443 ssl;
        http2           on;
        server_name     _;

        # TLS configuration. The example references the standard
        # /etc/ssl/ paths; replace with your operator-provided cert
        # and key (e.g. from Let's Encrypt or your internal CA).
        # Quick self-signed cert for local testing:
        #   openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
        #     -keyout /etc/ssl/private/mcp.key \
        #     -out    /etc/ssl/certs/mcp.crt \
        #     -subj   "/CN=mcp.local"
        ssl_certificate     /etc/ssl/certs/mcp.crt;
        ssl_certificate_key /etc/ssl/private/mcp.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security headers (defense in depth; the app does not return
        # user content, so these are mostly belt-and-suspenders).
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options    "nosniff" always;
        add_header X-Frame-Options           "DENY" always;
        add_header Referrer-Policy            "no-referrer" always;

        # --- Health probe (unauthenticated; the app exposes /healthz
        # on the same port as /mcp) ---
        location = /healthz {
            proxy_pass      http://127.0.0.1:3001/healthz;
            access_log      off;
        }

        # --- MCP transport ---
        location /mcp {
            proxy_pass      http://127.0.0.1:3001;

            # Preserve ALL request headers (Authorization, X-Request-Id,
            # X-Forwarded-For, X-Real-IP, X-Forwarded-Proto, ...).
            # The Authorization line is the load-bearing one for auth:
            # the shared @customized-mcps/mcp-http-base does HMAC validation on the
            # bearer token it receives from this header. Removing this
            # line breaks auth; setting it to a static value breaks
            # multi-agent isolation.
            proxy_pass_request_headers    on;
            proxy_set_header  Host              $host;
            proxy_set_header  X-Real-IP         $remote_addr;
            proxy_set_header  X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header  X-Forwarded-Proto $scheme;
            proxy_set_header  X-Request-Id      $http_x_request_id;
            proxy_set_header  Authorization     $http_authorization;

            # SSE / streaming-friendly: chunked transfer encoding
            # passes through so the SDK transport can flush events
            # to the client as they arrive.
            chunked_transfer_encoding   on;
        }
    }
}
